services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=delta_learn.settings
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,.pythonanywhere.com}
      - DB_PATH=/app/data/db.sqlite3
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/subjects/')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  backend-data:
